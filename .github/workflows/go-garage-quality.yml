name: Go-Garage Quality Assurance

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

env:
  GO_VERSION_SPEC: '1.24.x'
  VEHICLE_APP_NAME: go-garage

jobs:
  code-quality-checks:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout go-garage repository
        uses: actions/checkout@v4

      - name: Setup Go toolchain for go-garage
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION_SPEC }}
          cache: true

      - name: Verify go.mod is tidy for vehicle management app
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Execute gofmt check on codebase
        run: |
          unformatted_files=$(gofmt -l .)
          if [ -n "$unformatted_files" ]; then
            echo "The following files need formatting:"
            echo "$unformatted_files"
            exit 1
          fi

      - name: Run go vet static analyzer
        run: go vet ./...

      - name: Install golangci-lint for go-garage
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.62.2
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Execute golangci-lint analysis
        run: golangci-lint run --config .golangci.yml --timeout 5m

      - name: Run go-garage test suite with coverage
        run: |
          go test -race -coverprofile=garage_coverage.txt -covermode=atomic ./...
          go tool cover -func=garage_coverage.txt

      - name: Generate coverage summary for vehicle app
        run: |
          total_coverage=$(go tool cover -func=garage_coverage.txt | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total test coverage: ${total_coverage}%"
          echo "GARAGE_COVERAGE=${total_coverage}" >> $GITHUB_ENV

      - name: Upload coverage metrics to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./garage_coverage.txt
          flags: go-garage-tests
          name: go-garage-coverage
          fail_ci_if_error: false

      - name: Build go-garage server binary
        run: |
          mkdir -p bin
          go build -v -o bin/${VEHICLE_APP_NAME} ./cmd/server
          ls -lh bin/${VEHICLE_APP_NAME}

      - name: Verify binary execution
        run: |
          file bin/${VEHICLE_APP_NAME}
          test -x bin/${VEHICLE_APP_NAME}

  docker-image-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: code-quality-checks
    permissions:
      contents: read

    steps:
      - name: Checkout go-garage source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx for multi-platform
        uses: docker/setup-buildx-action@v3

      - name: Build go-garage container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: go-garage:ci-validation
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify container image structure
        run: |
          docker images | grep go-garage
          docker inspect go-garage:ci-validation

      - name: Test container startup and health
        run: |
          docker run -d --name garage-test-instance \
            -e SERVER_PORT=8080 \
            -e ENVIRONMENT=development \
            -e DB_PATH=/app/data/test.db \
            -p 8080:8080 \
            go-garage:ci-validation
          
          sleep 5
          
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
          if [ "$response" != "200" ]; then
            echo "Health check failed with status: $response"
            docker logs garage-test-instance
            exit 1
          fi
          
          docker stop garage-test-instance
          docker rm garage-test-instance

  validation-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [code-quality-checks, docker-image-validation]
    if: always()
    permissions: {}

    steps:
      - name: Report validation results
        run: |
          echo "Go-Garage CI Pipeline Results"
          echo "=============================="
          echo "Code Quality: ${{ needs.code-quality-checks.result }}"
          echo "Docker Build: ${{ needs.docker-image-validation.result }}"
          
          if [ "${{ needs.code-quality-checks.result }}" != "success" ] || [ "${{ needs.docker-image-validation.result }}" != "success" ]; then
            echo "Quality gate failed - please review errors above"
            exit 1
          fi
          
          echo "All quality checks passed successfully!"
