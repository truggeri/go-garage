name: Minification

on:
  pull_request:
    branches: [main]

jobs:
  minify:
    name: Minify ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install minifier
        run: go install github.com/tdewolff/minify/v2/cmd/minify@latest

      - name: Run css minifier
        run: minify --type=css web/static/css/main.css -o /tmp/minified-output.css

      - name: Run js minifier
        run: minify --type=hs web/static/js/main.js -o /tmp/minified-output.js

      - name: Check if minified output has changed
        id: check
        run: |
          if [ ! -f web/static/css/main-minified.css ] || ! diff -q /tmp/minified-output.css web/static/css/main-minified.css > /dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ ! -f web/static/js/main-minified.js ] || ! diff -q /tmp/minified-output.js web/static/js/main-minified.js > /dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update minified css file
        if: steps.check.outputs.changed == 'true'
        run: |
          cp /tmp/minified-output.css web/static/css/main-minified.css &&
          cp /tmp/minified-output.js web/static/js/main-minified.js

      - name: Commit and push changes
        if: steps.check.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/static/css/main-minified.css
          git add web/static/js/main-minified.js
          git commit -m "Adding minified assets"
          git push
