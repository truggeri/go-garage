version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - misspell
    - unparam
    - unconvert
    - goconst
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable-all: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  skip-dirs:
    - vendor
    - bin
  skip-files:
    - ".*_test.go"
