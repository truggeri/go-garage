openapi: 3.0.3
info:
  title: Go-Garage API
  description: |
    RESTful API for the Go-Garage vehicle management application.
    
    This API allows users to manage their vehicles, track maintenance records, 
    and monitor fuel consumption. All API endpoints require JWT authentication 
    except for the authentication endpoints themselves.
    
    ## Authentication
    Most endpoints require authentication using JWT tokens. To authenticate:
    1. Register a new account using `/api/v1/auth/register`
    2. Login using `/api/v1/auth/login` to receive access and refresh tokens
    3. Include the access token in the `Authorization` header as `Bearer {token}`
    4. Refresh the access token using `/api/v1/auth/refresh` when it expires
    
    ## Error Responses
    All error responses follow a consistent format with error codes and messages.
  version: 1.0.0
  contact:
    name: Go-Garage API Support
    url: https://github.com/truggeri/go-garage
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Authentication
    description: User authentication and authorization endpoints
  - name: Vehicles
    description: Vehicle management operations
  - name: Maintenance
    description: Maintenance record operations
  - name: Fuel
    description: Fuel record operations
  - name: Users
    description: User profile operations
  - name: Health
    description: Health check endpoint

paths:
  /health:
    get:
      summary: Health check
      description: Check the health status of the API and database
      operationId: healthCheck
      tags:
        - Health
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  database:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unhealthy
                  database:
                    type: string
                    example: unhealthy
                  timestamp:
                    type: string
                    format: date-time

  /api/v1/auth/register:
    post:
      summary: Register a new user
      description: Create a new user account and receive authentication tokens
      operationId: register
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      summary: Login
      description: Authenticate with username/email and password to receive tokens
      operationId: login
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      summary: Refresh token
      description: Refresh the access token using a valid refresh token
      operationId: refreshToken
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      summary: Logout
      description: |
        Logout from the application. Note: With stateless JWT, logout is handled
        client-side by deleting tokens. This endpoint acknowledges the logout request.
      operationId: logout
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logout successful. Please delete your tokens client-side.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/vehicles:
    get:
      summary: List vehicles
      description: Get a list of all vehicles owned by the authenticated user
      operationId: listVehicles
      tags:
        - Vehicles
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: make
          in: query
          description: Filter by vehicle make
          schema:
            type: string
        - name: model
          in: query
          description: Filter by vehicle model
          schema:
            type: string
        - name: year
          in: query
          description: Filter by vehicle year
          schema:
            type: integer
        - name: status
          in: query
          description: Filter by vehicle status
          schema:
            type: string
            enum: [active, sold, scrapped]
        - name: sort
          in: query
          description: Sort field and direction (e.g., 'year:asc', 'make:desc')
          schema:
            type: string
      responses:
        '200':
          description: List of vehicles
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Vehicle'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create vehicle
      description: Create a new vehicle for the authenticated user
      operationId: createVehicle
      tags:
