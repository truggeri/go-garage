{{define "navigation"}}
<nav class="navbar" role="navigation" aria-label="main navigation">
    <div class="container navbar-content">
        <a href="/" class="navbar-brand">Go-Garage</a>
        <button class="navbar-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span class="navbar-toggle-icon"></span>
        </button>
        <div class="navbar-menu">
            {{if .IsAuthenticated}}
            <div class="navbar-links">
                <a href="/dashboard" class="navbar-link">Dashboard</a>
                <a href="/vehicles" class="navbar-link">Vehicles</a>
                <a href="/maintenance" class="navbar-link">Maintenance</a>
            </div>
            <div class="navbar-user">
                <span class="navbar-username">{{.UserName}}</span>
                <a href="/profile" class="navbar-link">Profile</a>
                <a href="/logout" class="navbar-link">Logout</a>
            </div>
            {{else}}
            <div class="navbar-links">
                <a href="/login" class="navbar-link">Login</a>
                <a href="/register" class="navbar-link">Register</a>
            </div>
            {{end}}
            <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
                <span class="theme-toggle-sun" aria-hidden="true">&#9728;</span>
                <span class="theme-toggle-moon" aria-hidden="true">&#9790;</span>
            </button>
        </div>
    </div>
</nav>
{{end}}
