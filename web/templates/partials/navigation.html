{{define "navigation"}}
<nav class="navbar" role="navigation" aria-label="main navigation">
    <div class="container navbar-content">
        <a href="{{if .IsAuthenticated}}/dashboard{{else}}/{{end}}" class="navbar-brand">Go-Garage</a>
        <button class="navbar-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span class="navbar-toggle-icon"></span>
        </button>
        <div class="navbar-menu">
            {{if .IsAuthenticated}}
            <div class="navbar-links">
                <a href="/dashboard" class="navbar-link{{if eq .ActiveNav "dashboard"}} navbar-link--active{{end}}"{{if eq .ActiveNav "dashboard"}} aria-current="page"{{end}}>Dashboard</a>
                <a href="/vehicles" class="navbar-link{{if eq .ActiveNav "vehicles"}} navbar-link--active{{end}}"{{if eq .ActiveNav "vehicles"}} aria-current="page"{{end}}>Vehicles</a>
                <a href="/maintenance" class="navbar-link{{if eq .ActiveNav "maintenance"}} navbar-link--active{{end}}"{{if eq .ActiveNav "maintenance"}} aria-current="page"{{end}}>Maintenance</a>
            </div>
            <div class="navbar-user-dropdown">
                <button class="navbar-user-toggle" aria-expanded="false" aria-haspopup="true">
                    <span class="navbar-username">{{.UserName}}</span>
                    <span class="navbar-caret" aria-hidden="true">&#9662;</span>
                </button>
                <div class="navbar-dropdown-menu" role="menu">
                    <a href="/profile" class="navbar-dropdown-item{{if eq .ActiveNav "profile"}} navbar-dropdown-item--active{{end}}" role="menuitem">Profile</a>
                    <div class="navbar-dropdown-divider" role="separator"></div>
                    <a href="/logout" class="navbar-dropdown-item" role="menuitem">Logout</a>
                </div>
            </div>
            {{else}}
            <div class="navbar-links">
                <a href="/login" class="navbar-link">Login</a>
                <a href="/register" class="navbar-link">Register</a>
            </div>
            {{end}}
            <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
                <span class="theme-toggle-sun" aria-hidden="true">&#9728;</span>
                <span class="theme-toggle-moon" aria-hidden="true">&#9790;</span>
            </button>
        </div>
    </div>
</nav>
{{end}}
