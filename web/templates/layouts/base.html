{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){var t=localStorage.getItem("theme")||(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}());</script>
    <title>{{block "title" .}}Go-Garage{{end}}</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <link rel="stylesheet" href="/static/css/main-minified.css">
    {{block "extra_head" .}}{{end}}
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    {{template "navigation" .}}
    <main id="main-content" class="container">
        {{template "flash-messages" .}}
        {{block "content" .}}{{end}}
    </main>
    {{template "footer" .}}
    <script src="/static/js/main-minified.js" defer></script>
    {{block "extra_scripts" .}}{{end}}
</body>
</html>{{end}}
