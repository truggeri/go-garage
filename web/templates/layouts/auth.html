{{define "auth"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){var t=localStorage.getItem("theme")||(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}());</script>
    <title>{{block "title" .}}Go-Garage{{end}}</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <link rel="stylesheet" href="/static/css/main-minified.css">
    {{block "extra_head" .}}{{end}}
</head>
<body class="auth-page">
    <a href="#main-content" class="skip-link">Skip to content</a>
    <button class="theme-toggle theme-toggle--fixed" id="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
        <span class="theme-toggle-sun" aria-hidden="true">&#9728;</span>
        <span class="theme-toggle-moon" aria-hidden="true">&#9790;</span>
    </button>
    <div class="auth-container">
        <div class="auth-brand">
            <a href="/">Go-Garage</a>
        </div>
        {{template "flash-messages" .}}
        <div id="main-content">
            {{block "content" .}}{{end}}
        </div>
    </div>
    {{template "footer" .}}
    <script src="/static/js/main-minified.js" defer></script>
    {{block "extra_scripts" .}}{{end}}
</body>
</html>{{end}}
