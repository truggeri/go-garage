version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-garage-app
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - APP_PORT=8080
      - LOG_LEVEL=debug
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - garage-network

networks:
  garage-network:
    driver: bridge

volumes:
  garage-data:
    driver: local
