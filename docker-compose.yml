version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-garage-app
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - APP_PORT=8080
      - SERVER_HOST=0.0.0.0
      - LOG_LEVEL=debug
      - LOG_FORMAT=json
      - DB_PATH=/app/data/go-garage.db
    volumes:
      - garage-data:/app/data
    restart: unless-stopped
    networks:
      - garage-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  garage-network:
    driver: bridge

volumes:
  garage-data:
    driver: local
